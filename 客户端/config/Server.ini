[Server]
; Client runtime config. Only the keys below are read (see LoadRemoteServerConfig
; in src/Net/RemoteGateway.cpp). The server list is fetched from
; LoginHost:LoginPort/api/server/list, and all lobby/room/bootstrap URLs are
; derived from LobbyHttp, so they are not configured separately here.
LoginHost=127.0.0.1
LoginPort=40000
; LobbyHttp is the base URL for the Qt lobby client (login/room/chat).
; Plain HTTP is allowed in local/Radmin test builds. For production deployments
; login/register success messages show an HTTP plaintext hint; prefer https://
; and server-side TLS for production deployments.
LobbyHttp=http://127.0.0.1:40000
GameHost=127.0.0.1
GamePort=40001

[Client]
; Qt lobby client (QtLobby/MainWindow.cpp) reads these optional defaults.
; DefaultUsername/DefaultPassword pre-fill the login form. For security the
; in-code password default is EMPTY; set DefaultPassword here only on a trusted
; kiosk/lan-box where auto-login is desired. CLI --pass/--password was removed;
; use this INI key or type the password in the UI.
;   DefaultUsername=test001
;   DefaultPassword=
GameDisplayPreset=2
GameCompatibilityMode=false
GameDpiAware=false
